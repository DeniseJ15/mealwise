<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MealWise"/>
<meta name="theme-color" content="#1a1a2e"/>
<title>MealWise</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  body{font-family:'Georgia',serif;background:#f7f5f0;color:#1a1a2e;min-height:100vh;padding-bottom:80px}
  input,select,textarea,button{font-family:'Georgia',serif;font-size:14px}
  input,select,textarea{border:1px solid #ddd;border-radius:8px;padding:9px 11px;width:100%;background:#fff;color:#1a1a2e}
  textarea{resize:vertical}
  button{cursor:pointer;border:none;border-radius:8px;padding:10px 16px;font-weight:700}
  .btn-dark{background:#1a1a2e;color:#fff}
  .btn-green{background:#3a7d44;color:#fff}
  .btn-amber{background:#f59e0b;color:#fff}
  .btn-light{background:#f0ece6;color:#1a1a2e;font-weight:400}
  .btn-red{background:#fee;color:#c00;border:1px solid #fcc}
  .card{background:#fff;border-radius:12px;border:1px solid #e8e4dd;padding:14px;margin-bottom:12px}
  .badge{display:inline-block;border-radius:99px;font-size:10px;padding:1px 8px;font-weight:700;letter-spacing:0.4px;border:1px solid transparent}
  .section-label{font-size:11px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .row{display:flex;gap:8px;align-items:center}
  .row-wrap{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  #tabs-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8e4dd;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
  .tab-btn{flex:1;padding:10px 2px 8px;background:none;border:none;font-size:10px;font-weight:700;color:#aaa;display:flex;flex-direction:column;align-items:center;gap:2px;border-radius:0}
  .tab-btn.active{color:#1a1a2e}
  .tab-btn .icon{font-size:20px}
  #header{background:#1a1a2e;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;padding-top:max(14px,env(safe-area-inset-top))}
  #content{max-width:680px;margin:0 auto;padding:12px}
  .store-chip{display:inline-block;border-radius:99px;font-size:11px;padding:2px 10px;font-weight:700}
  .item-row{background:#fff;border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;border:1px solid #e8e4dd}
  .item-row.checked{background:#f7f5f0}
  .item-row.checked span.iname{text-decoration:line-through;color:#aaa}
  .alert-box{border-radius:10px;padding:10px 14px;margin-bottom:10px}
  .modal-overlay{position:fixed;inset:0;background:#0008;z-index:200;display:flex;align-items:flex-end}
  .modal{background:#fff;border-radius:16px 16px 0 0;padding:20px 16px 32px;width:100%;max-height:90vh;overflow-y:auto}
  .modal h3{font-size:16px;margin-bottom:14px}
  .chat-bubble{max-width:82%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.5;white-space:pre-wrap}
  .chat-user{background:#1a1a2e;color:#fff;border-radius:12px 12px 2px 12px;align-self:flex-end}
  .chat-ai{background:#f0ece6;color:#1a1a2e;border-radius:12px 12px 12px 2px;align-self:flex-start}
  .week-day{background:#fff;border-radius:12px;margin-bottom:8px;overflow:hidden;border:1px solid #e8e4dd}
  .week-day-header{background:#1a1a2e;color:#fff;padding:7px 14px;font-weight:700;font-size:13px}
  .meal-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f0ece6}
  .meal-row:last-child{border-bottom:none}
  .meal-label{width:68px;font-size:10px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0}
  .meal-val{flex:1;font-size:13px;color:#1a1a2e;padding:4px 6px;border-radius:5px;cursor:pointer;min-height:26px}
  .meal-val:hover{background:#f7f5f0}
  .meal-val.empty{color:#bbb}
  .meal-input{flex:1;border:1px solid #003087;border-radius:5px;padding:4px 8px;font-size:13px}
  .total-bar{background:#1a1a2e;color:#fff;border-radius:10px;padding:10px 14px;margin-bottom:10px}
  .cost-input{width:90px;text-align:right;padding:5px 8px}
  label{font-size:13px}
  .dirty-pill{background:#fff3e0;border:1px solid #f59e0b;color:#b45309;border-radius:99px;font-size:10px;padding:1px 8px;font-weight:700}
  .clean-pill{background:#e8f5ea;border:1px solid #3a7d44;color:#3a7d44;border-radius:99px;font-size:10px;padding:1px 8px;font-weight:700}
  .picky-btn{border-radius:99px;padding:5px 13px;font-size:12px;font-weight:700;border:1.5px solid}
  select option{color:#1a1a2e}
</style>
</head>
<body>

<div id="header">
  <div>
    <div style="color:#fff;font-weight:700;font-size:20px;letter-spacing:-0.5px">🥦 MealWise</div>
    <div style="color:#aaa;font-size:11px">Smart planning for real families</div>
  </div>
  <button id="picky-toggle" class="picky-btn"></button>
</div>

<div id="content"></div>

<div id="tabs-bar">
  <button class="tab-btn" data-tab="planner"><span class="icon">📅</span>Meals</button>
  <button class="tab-btn" data-tab="shopping"><span class="icon">🛒</span>Shopping</button>
  <button class="tab-btn" data-tab="staples"><span class="icon">📌</span>Staples</button>
  <button class="tab-btn" data-tab="sales"><span class="icon">🏷️</span>Sales</button>
  <button class="tab-btn" data-tab="stores"><span class="icon">🏪</span>Stores</button>
  <button class="tab-btn" data-tab="chat"><span class="icon">💬</span>AI</button>
</div>

<div id="modal-container"></div>

<script>
// ═══════════════════════════════════════════════════════
// DATA & CONSTANTS
// ═══════════════════════════════════════════════════════
const ANTHROPIC_API = "https://api.anthropic.com/v1/messages";
const DAYS  = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const MEALS = ["Breakfast","Lunch","Dinner","Snack"];
const CATEGORIES = ["Produce","Meat & Seafood","Dairy & Eggs","Pantry","Frozen","Snacks","Household","Other"];
const DIRTY_DOZEN = ["strawberries","spinach","kale","collard greens","mustard greens","peaches","pears","nectarines","apples","grapes","bell peppers","hot peppers","cherries","blueberries","green beans","potatoes"];
const CLEAN_FIFTEEN = ["avocados","sweet corn","pineapple","onions","papaya","sweet peas","asparagus","honeydew melon","kiwi","cabbage","mushrooms","mangoes","sweet potatoes","watermelon","carrots"];

const DEFAULT_STORES = [
  {id:"costco", name:"Costco", color:"#003087", light:"#e8eef8"},
  {id:"aldi",   name:"Aldi",   color:"#00529B", light:"#e6f0fa"},
  {id:"target", name:"Target", color:"#cc0000", light:"#fce8e8"},
  {id:"sprouts",name:"Sprouts",color:"#3a7d44", light:"#e8f5ea"},
];

// ── State ──────────────────────────────────────────────
let S = {
  tab: "planner",
  pickyMode: true,
  stores: [],
  mealPlan: {},
  shoppingItems: [],
  staples: [],
  city: "",
  aiChat: [],
  chatLoading: false,
  aiLoading: false,
  saleInput: "",
  editingCell: null,
  staplesSubTab: "list",
  showAddItem: false,
  showAddStaple: false,
  newItem: {name:"",storeId:"",qty:"",price:"",sale:false,saleNote:"",organic:false},
  newStaple: {name:"",storeId:"",qty:"",price:"",organic:false,watchSale:false,category:"Produce"},
  selectedDay: "Monday",
  selectedMeal: "Dinner",
  mealPrompt: "",
};

// ── Persistence ────────────────────────────────────────
function load() {
  try {
    const stored = JSON.parse(localStorage.getItem("mealwise_v2")||"{}");
    S.stores       = stored.stores       || JSON.parse(JSON.stringify(DEFAULT_STORES));
    S.mealPlan     = stored.mealPlan     || makeEmptyPlan();
    S.shoppingItems= stored.shoppingItems|| [];
    S.staples      = stored.staples      || [];
    S.city         = stored.city         || "";
    S.pickyMode    = stored.pickyMode    !== undefined ? stored.pickyMode : true;
    // ensure all days exist
    DAYS.forEach(d=>{ if(!S.mealPlan[d]) S.mealPlan[d]={Breakfast:"",Lunch:"",Dinner:"",Snack:""}; });
    // set default storeId for newItem/newStaple
    if(S.stores.length) {
      S.newItem.storeId   = S.stores[0].id;
      S.newStaple.storeId = S.stores[0].id;
    }
  } catch(e){ S.stores=JSON.parse(JSON.stringify(DEFAULT_STORES)); S.mealPlan=makeEmptyPlan(); }
}
function save() {
  localStorage.setItem("mealwise_v2", JSON.stringify({
    stores:S.stores, mealPlan:S.mealPlan, shoppingItems:S.shoppingItems,
    staples:S.staples, city:S.city, pickyMode:S.pickyMode
  }));
}
function makeEmptyPlan(){ return Object.fromEntries(DAYS.map(d=>[d,{Breakfast:"",Lunch:"",Dinner:"",Snack:""}])); }

// ── Helpers ────────────────────────────────────────────
function storeById(id){ return S.stores.find(s=>s.id===id)||S.stores[0]||{name:"?",color:"#999",light:"#eee",id:""}; }
function organicStatus(name){
  const n=(name||"").toLowerCase();
  if(DIRTY_DOZEN.some(d=>n.includes(d)||d.includes(n.split(" ")[0]))) return "dirty";
  if(CLEAN_FIFTEEN.some(d=>n.includes(d)||d.includes(n.split(" ")[0]))) return "clean";
  return null;
}
function fmtPrice(p){ const n=parseFloat(p); return isNaN(n)?"":"$"+n.toFixed(2); }
function uid(){ return Date.now()+"_"+Math.random().toString(36).slice(2); }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ═══════════════════════════════════════════════════════
// AI
// ═══════════════════════════════════════════════════════
async function callAI(messages, systemPrompt, useWebSearch=false){
  const body = { model:"claude-sonnet-4-20250514", max_tokens:1000, messages };
  if(systemPrompt) body.system = systemPrompt;
  if(useWebSearch) body.tools = [{type:"web_search_20250305",name:"web_search"}];
  const res = await fetch(ANTHROPIC_API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const d = await res.json();
  return d.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"";
}

async function generateMeal(){
  S.aiLoading=true; render();
  try {
    const sales = S.shoppingItems.filter(i=>i.sale).map(i=>`${i.name} (${storeById(i.storeId).name})`).join(", ");
    const watch = S.staples.filter(s=>s.watchSale).map(s=>s.name).join(", ");
    const txt = await callAI([{role:"user",content:
      `Suggest a ${S.selectedMeal.toLowerCase()} for ${S.selectedDay}.
${S.pickyMode?"Picky child: simple kid-friendly, no mixed foods, veggies on side only.":""}
${S.mealPrompt?"Request: "+S.mealPrompt:""}
${sales?"On sale: "+sales:""}
${watch?"Family staples: "+watch:""}
Reply with ONLY a short meal name (3-6 words). Nothing else.`}]);
    if(txt.trim()) { S.mealPlan[S.selectedDay][S.selectedMeal]=txt.trim(); save(); }
  } catch(e){}
  S.aiLoading=false; render();
}

async function generateWeek(){
  S.aiLoading=true; render();
  try {
    const sales = S.shoppingItems.filter(i=>i.sale).map(i=>`${i.name} at ${storeById(i.storeId).name}`).join(", ");
    const watch = S.staples.filter(s=>s.watchSale).map(s=>s.name).join(", ");
    const txt = await callAI([{role:"user",content:
      `Generate 7 dinners Monday–Sunday.
${S.pickyMode?"CRITICAL: picky child. Simple separate foods: pasta, nuggets, tacos (build-your-own), grilled cheese, pizza, mac & cheese, quesadillas, burgers, hot dogs. No mixed/combined dishes.":"Varied healthy family dinners."}
${sales?"Prioritize on-sale: "+sales:""}
${watch?"Incorporate these if possible: "+watch:""}
JSON only, no markdown: {"Monday":"meal","Tuesday":"meal","Wednesday":"meal","Thursday":"meal","Friday":"meal","Saturday":"meal","Sunday":"meal"}`}]);
    const p = JSON.parse(txt.replace(/```json|```/g,"").trim());
    DAYS.forEach(d=>{ if(p[d]) S.mealPlan[d].Dinner=p[d]; });
    save();
  } catch(e){}
  S.aiLoading=false; render();
}

async function generateShoppingList(){
  S.aiLoading=true; render();
  try {
    const mealsText = DAYS.flatMap(d=>MEALS.map(m=>S.mealPlan[d][m]?`${d} ${m}: ${S.mealPlan[d][m]}`:null).filter(Boolean)).join("\n");
    if(!mealsText){S.aiLoading=false;render();return;}
    const storeNames = S.stores.map(s=>s.name).join(", ");
    const storeDesc = S.stores.map(s=>`${s.name}=${s.id}`).join(", ");
    const txt = await callAI([{role:"user",content:
      `Shopping list from meal plan. Available stores: ${storeNames}.
Costco/warehouse=bulk items used multiple times. Sprouts/natural=fresh produce & quality meats. Budget stores=staples. General=packaged goods.
Dirty Dozen (organic=true): ${DIRTY_DOZEN.join(", ")}
Clean Fifteen (organic=false): ${CLEAN_FIFTEEN.join(", ")}
Meal plan:\n${mealsText}
Store IDs: ${storeDesc}
JSON only: {"storeId":[{"name":"x","qty":"y","organic":false}],...} Use exact storeId values.`}]);
    const p = JSON.parse(txt.replace(/```json|```/g,"").trim());
    const newItems=[];
    Object.entries(p).forEach(([sid,items])=>{
      (items||[]).forEach(item=>{
        if(!S.shoppingItems.some(si=>si.name.toLowerCase()===item.name.toLowerCase())){
          const os=organicStatus(item.name);
          newItems.push({id:uid(),name:item.name,storeId:sid,qty:item.qty||"",price:"",sale:false,saleNote:"",organic:item.organic||os==="dirty",organicStatus:os,checked:false});
        }
      });
    });
    S.shoppingItems=[...S.shoppingItems,...newItems]; save();
    S.tab="shopping";
  } catch(e){}
  S.aiLoading=false; render();
}

async function parseSaleText(){
  if(!S.saleInput.trim()) return;
  S.aiLoading=true; render();
  try {
    const watch = S.staples.filter(s=>s.watchSale).map(s=>s.name).join(", ");
    const storeNames = S.stores.map(s=>s.name+" (id:"+s.id+")").join(", ");
    const txt = await callAI([{role:"user",content:
      `Extract sale items from this text. Assign to one of these stores: ${storeNames}.
${watch?"Flag watchListHit:true if any of these appear: "+watch:""}
Text: "${S.saleInput}"
JSON array only: [{"name":"x","storeId":"storeid","saleNote":"detail","watchListHit":false}]`}]);
    const p = JSON.parse(txt.replace(/```json|```/g,"").trim());
    const newItems=p.map(item=>({id:uid(),name:item.name,storeId:item.storeId||S.stores[0]?.id||"",qty:"",price:"",sale:true,saleNote:item.saleNote||"",organic:false,organicStatus:organicStatus(item.name),checked:false,watchListHit:!!item.watchListHit}));
    S.shoppingItems=[...S.shoppingItems,...newItems]; save();
    S.saleInput="";
  } catch(e){}
  S.aiLoading=false; render();
}

async function checkSalesOnline(){
  const loc = S.city.trim() ? ` near ${S.city}` : "";
  const watch = S.staples.filter(s=>s.watchSale).map(s=>s.name).join(", ")||"produce, meat, dairy";
  const storeNames = S.stores.map(s=>s.name).join(", ");
  const msg = `Search the web for this week's current sales and weekly ads at ${storeNames}${loc}. List the best deals clearly by store. My watch list items (flag if on sale): ${watch}. Also flag any Dirty Dozen produce on sale as organic.`;
  S.aiChat=[...S.aiChat,{role:"user",content:msg}];
  S.tab="chat"; S.chatLoading=true; render();
  try {
    const watch2 = S.staples.filter(s=>s.watchSale).map(s=>s.name).join(", ");
    const reply = await callAI(S.aiChat,
      `You are a grocery assistant for stores: ${storeNames}. Watch list: ${watch2||"none"}. Use web search to find current weekly ads. Be concise.`,
      true);
    S.aiChat=[...S.aiChat,{role:"assistant",content:reply}];
  } catch(e){ S.aiChat=[...S.aiChat,{role:"assistant",content:"Search failed. Try again."}]; }
  S.chatLoading=false; render();
  // scroll chat to bottom
  setTimeout(()=>{ const c=document.getElementById("chat-messages"); if(c) c.scrollTop=c.scrollHeight; },100);
}

async function sendChat(msg){
  if(!msg.trim()) return;
  S.aiChat=[...S.aiChat,{role:"user",content:msg}];
  S.chatLoading=true; render();
  const storeNames=S.stores.map(s=>s.name).join(", ");
  const watch=S.staples.filter(s=>s.watchSale).map(s=>s.name).join(", ");
  try {
    const reply = await callAI(S.aiChat,
      `You are a smart meal & grocery assistant. Stores: ${storeNames}. ${S.pickyMode?"Picky child: no mixed foods.":""}
Meal plan: ${JSON.stringify(S.mealPlan)}. Shopping list: ${JSON.stringify(S.shoppingItems.map(i=>i.name+(i.sale?" (SALE at "+storeById(i.storeId).name+")":"")))}.
Staples: ${S.staples.map(s=>s.name).join(", ")}. Watch list: ${watch||"none"}.
Dirty Dozen (always organic): ${DIRTY_DOZEN.slice(0,8).join(", ")} and more. Be concise.`, true);
    S.aiChat=[...S.aiChat,{role:"assistant",content:reply}];
  } catch(e){ S.aiChat=[...S.aiChat,{role:"assistant",content:"Error. Try again."}]; }
  S.chatLoading=false; render();
  setTimeout(()=>{ const c=document.getElementById("chat-messages"); if(c) c.scrollTop=c.scrollHeight; },100);
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render(){
  renderHeader();
  renderTabs();
  const el=document.getElementById("content");
  if(S.tab==="planner")  el.innerHTML=renderPlanner();
  if(S.tab==="shopping") el.innerHTML=renderShopping();
  if(S.tab==="staples")  el.innerHTML=renderStaples();
  if(S.tab==="sales")    el.innerHTML=renderSales();
  if(S.tab==="stores")   el.innerHTML=renderStores();
  if(S.tab==="chat")     el.innerHTML=renderChat();
  attachEvents();
  if(S.tab==="chat") setTimeout(()=>{ const c=document.getElementById("chat-messages"); if(c) c.scrollTop=c.scrollHeight; },50);
}

function renderHeader(){
  const btn=document.getElementById("picky-toggle");
  if(S.pickyMode){ btn.style.cssText="border-color:#f59e0b;color:#f59e0b;background:#f59e0b22"; btn.textContent="👶 Picky ON"; }
  else { btn.style.cssText="border-color:#555;color:#aaa;background:#ffffff22"; btn.textContent="👶 Picky OFF"; }
}

function renderTabs(){
  document.querySelectorAll(".tab-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.tab===S.tab);
  });
}

// ── PLANNER ────────────────────────────────────────────
function renderPlanner(){
  const storeOpts = S.stores.map(s=>`<option value="${esc(s.id)}" ${S.selectedDay===s.id?"selected":""}>${esc(s.name)}</option>`).join("");
  const dayOpts = DAYS.map(d=>`<option ${S.selectedDay===d?"selected":""}>${d}</option>`).join("");
  const mealOpts = MEALS.map(m=>`<option ${S.selectedMeal===m?"selected":""}>${m}</option>`).join("");
  let days="";
  DAYS.forEach(day=>{
    let rows="";
    MEALS.forEach(meal=>{
      const val=S.mealPlan[day]?.[meal]||"";
      const cellId=`${day}||${meal}`;
      if(S.editingCell===cellId){
        rows+=`<div class="meal-row"><span class="meal-label">${meal}</span><input class="meal-input" id="cell-input" value="${esc(val)}" data-day="${esc(day)}" data-meal="${esc(meal)}"/></div>`;
      } else {
        rows+=`<div class="meal-row"><span class="meal-label">${meal}</span><span class="meal-val ${val?"":"empty"}" data-edit="${esc(cellId)}">${esc(val)||"tap to add..."}</span>${val?`<button class="clear-meal" data-day="${esc(day)}" data-meal="${esc(meal)}" style="background:none;border:none;color:#ccc;padding:2px 6px;font-size:14px">✕</button>`:""}</div>`;
      }
    });
    days+=`<div class="week-day"><div class="week-day-header">${day}</div><div style="padding:6px 14px">${rows}</div></div>`;
  });
  return `
  <div class="row-wrap" style="margin-bottom:14px">
    <button class="btn-dark" id="btn-fill-week" style="flex:1" ${S.aiLoading?"disabled":""}>✨ ${S.aiLoading?"Generating...":"Fill Week's Dinners"}</button>
    <button class="btn-green" id="btn-build-list" style="flex:1" ${S.aiLoading?"disabled":""}>🛒 Build Shopping List</button>
  </div>
  <div class="card">
    <div style="font-weight:700;margin-bottom:10px;font-size:14px">⚡ Quick Meal Generator</div>
    <div class="row-wrap" style="margin-bottom:8px">
      <select id="sel-day" style="flex:1">${dayOpts}</select>
      <select id="sel-meal" style="flex:1">${mealOpts}</select>
    </div>
    <div class="row">
      <input id="meal-prompt" placeholder="Optional: 'quick', 'pasta', 'no chicken'..." value="${esc(S.mealPrompt)}" style="flex:1"/>
      <button class="btn-dark" id="btn-suggest" style="white-space:nowrap;padding:9px 14px" ${S.aiLoading?"disabled":""}>${S.aiLoading?"...":"Suggest"}</button>
    </div>
  </div>
  ${days}`;
}

// ── SHOPPING ───────────────────────────────────────────
function renderShopping(){
  // totals
  const allUnchecked = S.shoppingItems.filter(i=>!i.checked);
  const grandTotal = allUnchecked.reduce((a,i)=>a+(parseFloat(i.price)||0),0);
  const storeOpts = S.stores.map(s=>`<option value="${esc(s.id)}" ${S.newItem.storeId===s.id?"selected":""}>${esc(s.name)}</option>`).join("");
  const catOpts = S.stores.map(s=>{
    const unc=S.shoppingItems.filter(i=>i.storeId===s.id&&!i.checked).length;
    const sal=S.shoppingItems.filter(i=>i.storeId===s.id&&!i.checked&&i.sale).length;
    const tot=S.shoppingItems.filter(i=>i.storeId===s.id&&!i.checked).reduce((a,i)=>a+(parseFloat(i.price)||0),0);
    return `<div class="store-card" data-store="${esc(s.id)}" style="background:#fff;border:2px solid ${s.light};border-radius:10px;padding:9px 12px;cursor:pointer;flex:1;min-width:calc(50% - 4px)">
      <div style="font-weight:700;font-size:14px;color:${s.color}">${esc(s.name)}</div>

          <div class="row-wrap">
            <span class="iname" style="font-size:14px">${esc(item.name)}</span>
            ${item.qty?`<span style="font-size:12px;color:#999">${esc(item.qty)}</span>`:""}
            ${item.organic?`<span class="badge" style="background:#3a7d441a;color:#3a7d44;border-color:#3a7d4433">ORGANIC</span>`:""}
            ${item.sale?`<span class="badge" style="background:${store.color}1a;color:${store.color};border-color:${store.color}33">SALE</span>`:""}
            ${item.watchListHit?`<span class="badge" style="background:#fffbea;color:#b45309;border-color:#f59e0b44">WATCHED🔔</span>`:""}

// MODALS
// ═══════════════════════════════════════════════════════
function showStoreModal(storeId){
  const store = storeId ? storeById(storeId) : {id:uid(),name:"",color:"#555555",light:"#eeeeee"};
  const isNew = !storeId;
  const colors=["#003087","#00529B","#cc0000","#3a7d44","#7c3aed","#0891b2","#be185d","#b45309","#374151","#065f46"];
  const swatches=colors.map(c=>`<div data-swatch="${c}" style="width:30px;height:30px;border-radius:8px;background:${c};cursor:pointer;border:3px solid ${store.color===c?"#fff":"transparent"};box-shadow:${store.color===c?"0 0 0 2px "+c:"none"}"></div>`).join("");
  document.getElementById("modal-container").innerHTML=`
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3>${isNew?"Add New Store":"Edit Store"}</h3>
      <div style="margin-bottom:12px">
        <div class="section-label" style="margin-bottom:6px">Store Name</div>
        <input id="store-name-input" value="${esc(store.name)}" placeholder="e.g. Whole Foods, Farmer's Market..."/>
      </div>
      <div style="margin-bottom:16px">
        <div class="section-label" style="margin-bottom:8px">Color</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap" id="color-swatches">${swatches}</div>
        <input id="store-color-input" value="${store.color}" placeholder="#hex color" style="margin-top:8px"/>
      </div>
      <div class="row">
        <button class="btn-dark" id="btn-save-store" data-storeid="${esc(store.id)}" data-isnew="${isNew}" style="flex:1">Save Store</button>
        <button class="btn-light" id="btn-close-modal" style="flex:1">Cancel</button>
      </div>
    </div>
  </div>`;
  // swatch click
  document.querySelectorAll("[data-swatch]").forEach(sw=>{
    sw.addEventListener("click",()=>{
      document.getElementById("store-color-input").value=sw.dataset.swatch;
      document.querySelectorAll("[data-swatch]").forEach(s=>{ s.style.border="3px solid transparent"; s.style.boxShadow="none"; });
      sw.style.border="3px solid #fff"; sw.style.boxShadow="0 0 0 2px "+sw.dataset.swatch;
    });
  });
  document.getElementById("btn-close-modal").addEventListener("click",closeModal);
  document.getElementById("modal-overlay").addEventListener("click",e=>{ if(e.target.id==="modal-overlay") closeModal(); });
  document.getElementById("btn-save-store").addEventListener("click",()=>{
    const name=document.getElementById("store-name-input").value.trim();
    const color=document.getElementById("store-color-input").value.trim()||"#555";
    const light=color+"22";
    if(!name) return;
    if(isNew){ S.stores.push({id:store.id,name,color,light}); }
    else { S.stores=S.stores.map(s=>s.id===storeId?{...s,name,color,light}:s); }
    save(); closeModal(); render();
  });
}

function closeModal(){ document.getElementById("modal-container").innerHTML=""; }

// EVENT ATTACHMENT
// ═══════════════════════════════════════════════════════
function attachEvents(){
  // tabs
  document.querySelectorAll(".tab-btn[data-tab]").forEach(b=>b.addEventListener("click",()=>{ S.tab=b.dataset.tab; render(); }));
  document.querySelectorAll("[data-subtab]").forEach(b=>b.addEventListener("click",()=>{ S.staplesSubTab=b.dataset.subtab; render(); }));

  // picky toggle
  document.getElementById("picky-toggle")?.addEventListener("click",()=>{ S.pickyMode=!S.pickyMode; save(); render(); });

  // planner
  q("btn-fill-week",()=>generateWeek());
  q("btn-build-list",()=>generateShoppingList());
  q("btn-suggest",()=>{ S.mealPrompt=v("meal-prompt"); generateMeal(); });
  on("sel-day","change",e=>S.selectedDay=e.target.value);
  on("sel-meal","change",e=>S.selectedMeal=e.target.value);
  on("meal-prompt","input",e=>{ S.mealPrompt=e.target.value; });
  on("cell-input","blur",e=>{ if(S.editingCell){ const[day,meal]=S.editingCell.split("||"); S.mealPlan[day][meal]=e.target.value; save(); S.editingCell=null; render(); }});
  on("cell-input","keydown",e=>{ if(e.key==="Enter") e.target.blur(); });
  document.querySelectorAll("[data-edit]").forEach(el=>el.addEventListener("click",()=>{ S.editingCell=el.dataset.edit; render(); setTimeout(()=>document.getElementById("cell-input")?.focus(),50); }));
  document.querySelectorAll(".clear-meal").forEach(el=>el.addEventListener("click",()=>{ S.mealPlan[el.dataset.day][el.dataset.meal]=""; save(); render(); }));

  // shopping
  q("btn-show-add-item",()=>{ S.showAddItem=true; render(); });
  q("btn-cancel-item",()=>{ S.showAddItem=false; render(); });
  on("ni-name","input",e=>{ S.newItem.name=e.target.value; });
  on("ni-qty","input",e=>{ S.newItem.qty=e.target.value; });
  on("ni-price","input",e=>{ S.newItem.price=e.target.value; });
  on("ni-store","change",e=>{ S.newItem.storeId=e.target.value; });
  on("ni-organic","change",e=>{ S.newItem.organic=e.target.checked; });
  on("ni-sale","change",e=>{ S.newItem.sale=e.target.checked; render(); });
  on("ni-salenote","input",e=>{ S.newItem.saleNote=e.target.value; });
  q("btn-add-item",()=>{
    // read current field values directly in case state wasn't synced
    S.newItem.name   = v("ni-name")  || S.newItem.name;
    S.newItem.qty    = v("ni-qty")   || S.newItem.qty;
    S.newItem.price  = v("ni-price") || S.newItem.price;
    if(!S.newItem.name.trim()) return;
    const os=organicStatus(S.newItem.name);
    S.shoppingItems.push({id:uid(),...S.newItem,organic:S.newItem.organic||os==="dirty",organicStatus:os,checked:false});
    S.newItem={name:"",storeId:S.stores[0]?.id||"",qty:"",price:"",sale:false,saleNote:"",organic:false};
    S.showAddItem=false; save(); render();
  });
  document.querySelectorAll("[data-toggle]").forEach(el=>el.addEventListener("change",()=>{
    S.shoppingItems=S.shoppingItems.map(i=>i.id===el.dataset.toggle?{...i,checked:!i.checked}:i); save(); render();
  }));
  document.querySelectorAll("[data-price]").forEach(el=>el.addEventListener("change",e=>{
    S.shoppingItems=S.shoppingItems.map(i=>i.id===el.dataset.price?{...i,price:e.target.value}:i); save(); render();
  }));
  document.querySelectorAll("[data-delete]").forEach(el=>el.addEventListener("click",()=>{
    S.shoppingItems=S.shoppingItems.filter(i=>i.id!==el.dataset.delete); save(); render();
  }));
  q("btn-clear-checked",()=>{ S.shoppingItems=S.shoppingItems.filter(i=>!i.checked); save(); render(); });

  // staples
  q("btn-load-staples",()=>{
    const toAdd=S.staples.filter(s=>s.name.trim()&&!S.shoppingItems.some(i=>i.name.toLowerCase()===s.name.toLowerCase()))
      .map(s=>{ const os=organicStatus(s.name); return {id:uid(),name:s.name,storeId:s.storeId,qty:s.qty,price:s.price||"",sale:false,saleNote:"",organic:s.organic||os==="dirty",organicStatus:os,checked:false,fromStaples:true}; });
    S.shoppingItems=[...S.shoppingItems,...toAdd]; save(); S.tab="shopping"; render();
  });
  q("btn-show-add-staple",()=>{ S.showAddStaple=true; render(); });
  q("btn-cancel-staple",()=>{ S.showAddStaple=false; render(); });
  on("ns-name","input",e=>{ S.newStaple.name=e.target.value; });
  on("ns-qty","input",e=>{ S.newStaple.qty=e.target.value; });
  on("ns-price","input",e=>{ S.newStaple.price=e.target.value; });
  on("ns-store","change",e=>{ S.newStaple.storeId=e.target.value; });
  on("ns-cat","change",e=>{ S.newStaple.category=e.target.value; });
  on("ns-organic","change",e=>{ S.newStaple.organic=e.target.checked; });
  on("ns-watch","change",e=>{ S.newStaple.watchSale=e.target.checked; });
  q("btn-save-staple",()=>{
    // read fields directly so keyboard dismissal never loses data
    S.newStaple.name  = v("ns-name")  || S.newStaple.name;
    S.newStaple.qty   = v("ns-qty")   || S.newStaple.qty;
    S.newStaple.price = v("ns-price") || S.newStaple.price;
    if(!S.newStaple.name.trim()) return;
    const os=organicStatus(S.newStaple.name);
    S.staples.push({id:uid(),...S.newStaple,organic:S.newStaple.organic||os==="dirty",organicStatus:os});
    S.newStaple={name:"",storeId:S.stores[0]?.id||"",qty:"",price:"",organic:false,watchSale:false,category:"Produce"};
    S.showAddStaple=false; save(); render();
  });
  document.querySelectorAll("[data-watchstaple]").forEach(el=>el.addEventListener("click",()=>{
    S.staples=S.staples.map(s=>s.id===el.dataset.watchstaple?{...s,watchSale:!s.watchSale}:s); save(); render();
  }));
  document.querySelectorAll("[data-deletestaple]").forEach(el=>el.addEventListener("click",()=>{
    S.staples=S.staples.filter(s=>s.id!==el.dataset.deletestaple); save(); render();
  }));

  // sales
  on("city-input","input",e=>{ S.city=e.target.value; });
  on("city-input","blur",e=>{ S.city=e.target.value; save(); });
  on("sale-input","input",e=>{ S.saleInput=e.target.value; });
  q("btn-check-sales",()=>checkSalesOnline());
  q("btn-parse-sales",()=>{ S.saleInput=v("sale-input")||S.saleInput; parseSaleText(); });

  // stores
  q("btn-add-store",()=>showStoreModal(null));
  document.querySelectorAll("[data-editstore]").forEach(el=>el.addEventListener("click",()=>showStoreModal(el.dataset.editstore)));
  document.querySelectorAll("[data-deletestore]").forEach(el=>el.addEventListener("click",()=>{
    if(confirm(`Remove ${storeById(el.dataset.deletestore).name}? Your items won't be deleted.`)){
      S.stores=S.stores.filter(s=>s.id!==el.dataset.deletestore); save(); render();
    }
  }));

  // chat
  q("btn-send-chat",()=>{ const m=v("chat-input"); if(m) sendChat(m); });
  on("chat-input","keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); const m=v("chat-input"); if(m) sendChat(m); }});
}

// ── DOM utils ──────────────────────────────────────────
function q(id,fn){ document.getElementById(id)?.addEventListener("click",fn); }
function on(id,ev,fn){ document.getElementById(id)?.addEventListener(ev,fn); }
function v(id){ return document.getElementById(id)?.value||""; }

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
load();
render();
</script>
</body>
</html>
